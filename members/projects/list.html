{{ define "content" }}
<div class="mx-auto max-w-7xl px-6 lg:px-8 py-10 lg:py-14">
  <div class="mb-10">
    <div class="font-mono text-[11px] uppercase tracking-[0.18em] text-accent mb-2">Account</div>
    <h1 class="text-3xl lg:text-4xl tracking-tighter font-semibold text-text">Projects</h1>
  </div>

  <div class="grid lg:grid-cols-12 gap-8">
    <aside class="lg:col-span-3">
      <nav class="flex lg:flex-col gap-1 lg:sticky lg:top-24">
        <a href="/profile" class="inline-flex items-center gap-2 rounded-md border border-border bg-surface/40 text-text-muted hover:text-text hover:border-border-strong px-3 py-2 text-[13px] transition-colors">
          <span class="font-mono text-[10px] uppercase tracking-[0.18em] text-text-dim">01</span> Profile
        </a>
        <a href="/cvs" class="inline-flex items-center gap-2 rounded-md border border-border bg-surface/40 text-text-muted hover:text-text hover:border-border-strong px-3 py-2 text-[13px] transition-colors">
          <span class="font-mono text-[10px] uppercase tracking-[0.18em] text-text-dim">02</span> Curriculums
        </a>
        <a href="/projects" class="inline-flex items-center gap-2 rounded-md border border-border-strong bg-surface text-text px-3 py-2 text-[13px] transition-colors">
          <span class="font-mono text-[10px] uppercase tracking-[0.18em] text-text-dim">03</span> Projects
        </a>
        <a href="/security" class="inline-flex items-center gap-2 rounded-md border border-border bg-surface/40 text-text-muted hover:text-text hover:border-border-strong px-3 py-2 text-[13px] transition-colors">
          <span class="font-mono text-[10px] uppercase tracking-[0.18em] text-text-dim">04</span> Security
        </a>
      </nav>
    </aside>

    <div class="lg:col-span-9 max-w-2xl">
      <div class="rounded-2xl border border-border bg-surface/50 p-6 lg:p-8 space-y-8">
        <div>
          <h2 class="text-xl font-semibold text-text tracking-tight">Projects</h2>
          <p class="text-[13px] text-text-muted mt-1">The projects you're working on that'll appear on your profile.</p>
        </div>

        <form id="myForm" hx-post="/projects" hx-trigger="submit" hx-target="#insertPoint" class="space-y-4">
          <div class="space-y-1.5">
            <label for="pt" class="block text-[13px] font-medium text-text">Title</label>
            <input id="pt" type="text" name="title"
              class="w-full h-10 rounded-md border border-border bg-surface/60 px-3 py-2 text-[14px] text-text placeholder:text-text-dim focus:outline-none focus:border-accent/50 transition-colors" />
          </div>
          <div class="space-y-1.5">
            <label for="pd" class="block text-[13px] font-medium text-text">Description</label>
            <input id="pd" type="text" name="description"
              class="w-full h-10 rounded-md border border-border bg-surface/60 px-3 py-2 text-[14px] text-text placeholder:text-text-dim focus:outline-none focus:border-accent/50 transition-colors" />
          </div>
          <div class="space-y-1.5">
            <label for="pl" class="block text-[13px] font-medium text-text">Link</label>
            <input id="pl" type="text" name="link"
              class="w-full h-10 rounded-md border border-border bg-surface/60 px-3 py-2 text-[14px] text-text placeholder:text-text-dim focus:outline-none focus:border-accent/50 transition-colors" />
          </div>
          <div>
            <button type="submit" id="submit_button"
              class="inline-flex items-center gap-1.5 rounded-md bg-accent px-4 py-2 text-[13px] font-medium text-black hover:bg-accent/90 transition-colors">
              Add project
            </button>
          </div>
        </form>

        <div>
          <div class="font-mono text-[11px] uppercase tracking-[0.18em] text-text-dim mb-3">Your projects</div>
          <ul class="space-y-2" id="insertPoint"></ul>
          <ul class="space-y-2">
            {{ range . }}
            <li class="flex items-start gap-3 rounded-xl border border-border bg-surface/40 p-4">
              <div class="flex-1">
                <div class="font-medium text-text text-[14px] tracking-tight">{{ .Title }}</div>
                <div class="text-[13px] text-text-muted leading-relaxed">{{ .Description }}</div>
              </div>
              <button hx-delete="/projects/{{ .Id }}"
                class="inline-flex items-center gap-1.5 rounded-md border border-border bg-surface/60 px-3 py-1.5 text-[12px] text-text-muted hover:text-text hover:border-border-strong transition-colors">
                Delete
              </button>
            </li>
            {{ end }}
          </ul>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const form = document.getElementById("myForm");
  form.addEventListener("htmx:afterRequest", function (event) {
    let button = document.getElementById("submit_button");
    button.innerText = "Added";
    setTimeout(() => {
      button.innerText = "Add project";
      button.disabled = false;
    }, 1000);
  });
  form.addEventListener("htmx:beforeRequest", function (event) {
    let button = document.getElementById("submit_button");
    button.innerHTML = "Saving…";
    button.disabled = true;
  });
</script>
{{ end }}
