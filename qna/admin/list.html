{{ define "content" }}
<section>
  <div class="space-y-6">
    <div class="flex items-center justify-between">
      <h2 class="text-xl font-semibold text-text tracking-tight">All QNAs</h2>
      <a href="/admin/qna/create-new"
        class="inline-flex items-center gap-1.5 rounded-md bg-accent px-3.5 py-1.5 text-[13px] font-medium text-black hover:bg-accent/90 transition-colors">
        Create new
      </a>
    </div>

    <ul class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-3">
      {{ range .list }}
      <li>
        <a href="/admin/qna/{{ .Id }}"
          class="block h-full rounded-xl border border-border bg-surface/40 p-5 hover:border-border-strong hover:bg-surface transition-colors">
          <div class="flex items-center gap-2 mb-3">
            <span class="h-1.5 w-1.5 rounded-full bg-accent"></span>
            <div class="font-semibold text-text text-[14px] tracking-tight uppercase flex-1 truncate">{{ .Name }}</div>
          </div>
          <div class="font-mono text-[11px] uppercase tracking-[0.18em] text-text-dim mb-3">{{ len .Questions }} questions</div>
          <div class="line-clamp-3 text-[13px] text-text-muted leading-relaxed">
            {{ range .Questions }}{{ .Value }} · {{ end }}
          </div>
        </a>
      </li>
      {{ end }}
    </ul>
  </div>
</section>
{{ end }}
