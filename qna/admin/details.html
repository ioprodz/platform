{{ define "content" }}
<section>
  <div class="space-y-6">
    <div class="flex items-center justify-between gap-3">
      <h2 class="text-xl font-semibold text-text tracking-tight">
        <a class="text-text-dim hover:text-text transition-colors" href="/admin/qna">QNAs</a>
        <span class="text-text-dim mx-1.5">/</span>
        {{ .Name }}
      </h2>
      <a href="/qna/{{ .Id }}"
        class="inline-flex items-center gap-1.5 rounded-md bg-accent px-3.5 py-1.5 text-[13px] font-medium text-black hover:bg-accent/90 transition-colors">
        Answer QNA
      </a>
    </div>

    <ul class="space-y-3">
      {{ range .Questions }}
      <li class="rounded-xl border border-border bg-surface/40 p-5">
        <h3 class="text-[15px] font-semibold text-text tracking-tight mb-4">{{ .Value }}</h3>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
          {{ range .Choices }}
          <div class="rounded-md border {{ if .IsCorrect }}border-accent bg-accent/5{{ else }}border-border bg-surface/50{{ end }} p-3 text-[13px] {{ if .IsCorrect }}text-text{{ else }}text-text-muted{{ end }}">
            {{ if .IsCorrect }}<span class="font-mono text-[10px] uppercase tracking-[0.18em] text-accent">Correct</span><br/>{{ end }}
            {{ .Value }}
          </div>
          {{ end }}
        </div>
      </li>
      {{ end }}
    </ul>
  </div>
</section>
{{ end }}
