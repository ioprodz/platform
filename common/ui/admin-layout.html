{{ define "admin-layout" }}
<div class="mx-auto max-w-7xl px-6 lg:px-8 py-10 lg:py-14">
  <div class="flex items-center justify-between mb-10">
    <div>
      <div class="font-mono text-[11px] uppercase tracking-[0.18em] text-accent mb-2">Admin</div>
      <h1 class="text-3xl lg:text-4xl tracking-tighter font-semibold text-text">Backstage</h1>
    </div>
  </div>

  <div class="grid lg:grid-cols-12 gap-8">
    <aside class="lg:col-span-2">
      <nav class="flex lg:flex-col gap-1 lg:sticky lg:top-24">
        <a href="/admin/qna" class="inline-flex items-center gap-2 rounded-md border border-border bg-surface/50 px-3 py-2 text-[13px] text-text hover:border-border-strong transition-colors">
          <span class="font-mono text-[10px] uppercase tracking-[0.18em] text-text-dim">01</span>
          QNAs
        </a>
        <a href="/admin/blog" class="inline-flex items-center gap-2 rounded-md border border-border bg-surface/50 px-3 py-2 text-[13px] text-text hover:border-border-strong transition-colors">
          <span class="font-mono text-[10px] uppercase tracking-[0.18em] text-text-dim">02</span>
          Blog
        </a>
      </nav>
    </aside>

    <div class="lg:col-span-10">
      <div class="rounded-2xl border border-border bg-surface/50 p-6 lg:p-8">
        {{ template "content" . }}
      </div>
    </div>
  </div>
</div>
{{ end }}
