{{ define "content" }}
<section class="relative overflow-hidden min-h-[60vh] flex items-center">
  <div class="absolute inset-0 grid-bg opacity-60 pointer-events-none"></div>
  <div class="absolute inset-0 accent-glow pointer-events-none"></div>
  <div class="relative mx-auto max-w-3xl px-6 lg:px-8 py-24 text-center">
    <div class="font-mono text-[11px] uppercase tracking-[0.18em] text-accent mb-5">{{ t "common:notFound.eyebrow" }}</div>
    <h1 class="text-5xl lg:text-7xl tracking-tighter font-semibold text-text leading-[0.98] mb-6">
      {{ t "common:notFound.headingLine1" }}<br/>
      <span class="text-text-muted">{{ t "common:notFound.headingLine2" }}</span>
    </h1>
    <p class="text-text-muted text-lg leading-relaxed max-w-lg mx-auto mb-10">
      {{ t "common:notFound.body" }}
    </p>
    <div class="flex flex-col sm:flex-row gap-3 justify-center">
      <a href="{{ localizedPath $.langMeta.Code "/" }}"
        class="inline-flex items-center justify-center gap-2 rounded-md bg-accent px-5 py-2.5 text-[14px] font-medium text-black hover:bg-accent/90 transition-colors">
        {{ t "common:notFound.backHome" }}
      </a>
      <a href="/blog"
        class="inline-flex items-center justify-center gap-2 rounded-md border border-border bg-surface/40 px-5 py-2.5 text-[14px] font-medium text-text hover:border-border-strong hover:bg-surface transition-colors">
        {{ t "common:notFound.readBlog" }}
      </a>
    </div>
  </div>
</section>
{{ end }}
