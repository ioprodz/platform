{{ define "content" }}
<section>
  <div class="space-y-6 max-w-2xl">
    <div>
      <h2 class="text-xl font-semibold text-text tracking-tight">Create Blog Post</h2>
      <p class="text-[13px] text-text-muted mt-1">Generate a starter post with AI.</p>
    </div>

    <form id="myForm" hx-post="/api/admin/blog" hx-target="#result" hx-trigger="submit" class="space-y-5">
      {{ if . }}
      <input type="hidden" name="postId" value="{{ .Id }}" required />
      {{ end }}

      <div class="space-y-1.5">
        <label for="title" class="block text-[13px] font-medium text-text">Title</label>
        <input type="text" name="title" id="title"
          value="{{ if . }}{{ .Title }}{{ end }}"
          class="w-full h-10 rounded-md border border-border bg-surface/60 px-3 py-2 text-[14px] text-text placeholder:text-text-dim focus:outline-none focus:border-accent/50 transition-colors"
          required />
        <p class="text-[12px] text-text-dim">The blog title.</p>
      </div>

      <div class="space-y-1.5">
        <label for="paragraphCount" class="block text-[13px] font-medium text-text">Paragraph count</label>
        <input type="number" min="1" max="10" value="3" name="paragraphCount" id="paragraphCount"
          class="w-full h-10 rounded-md border border-border bg-surface/60 px-3 py-2 text-[14px] text-text focus:outline-none focus:border-accent/50 transition-colors"
          required />
        <p class="text-[12px] text-text-dim">How many paragraphs to generate (1–10).</p>
      </div>

      <div class="grid grid-cols-3 gap-3">
        <label class="flex items-start gap-2 rounded-md border border-border bg-surface/40 p-3 cursor-pointer hover:border-border-strong transition-colors">
          <input type="checkbox" value="active" name="useEmojis" id="useEmojis" checked
            class="mt-0.5 h-4 w-4 rounded border-border bg-surface accent-accent" />
          <span>
            <span class="block text-[13px] font-medium text-text">Emojis</span>
            <span class="block text-[11px] text-text-dim">insert emojis where applicable</span>
          </span>
        </label>
        <label class="flex items-start gap-2 rounded-md border border-border bg-surface/40 p-3 cursor-pointer hover:border-border-strong transition-colors">
          <input type="checkbox" value="active" name="useMarkdown" id="useMarkdown"
            class="mt-0.5 h-4 w-4 rounded border-border bg-surface accent-accent" />
          <span>
            <span class="block text-[13px] font-medium text-text">Markdown</span>
            <span class="block text-[11px] text-text-dim">style the article</span>
          </span>
        </label>
        <label class="flex items-start gap-2 rounded-md border border-border bg-surface/40 p-3 cursor-pointer hover:border-border-strong transition-colors">
          <input type="checkbox" value="active" name="useMermaid" id="useMermaid"
            class="mt-0.5 h-4 w-4 rounded border-border bg-surface accent-accent" />
          <span>
            <span class="block text-[13px] font-medium text-text">Mermaid</span>
            <span class="block text-[11px] text-text-dim">illustrations when applicable</span>
          </span>
        </label>
      </div>

      <div class="flex items-center justify-between pt-4 border-t border-border">
        <a href="/admin/blog"
          class="inline-flex items-center gap-1.5 rounded-md border border-border bg-surface/40 px-3.5 py-1.5 text-[13px] text-text-muted hover:text-text hover:border-border-strong transition-colors">
          Back to list
        </a>
        <button id="submit_button" type="submit"
          class="inline-flex items-center gap-1.5 rounded-md bg-accent px-3.5 py-1.5 text-[13px] font-medium text-black hover:bg-accent/90 transition-colors">
          Create blog post
        </button>
      </div>
    </form>
    <div id="result" hx-swap="outerHTML"></div>

    <script>
      const form = document.getElementById("myForm");
      form.addEventListener("htmx:afterRequest", function (event) {
        var id = event.detail.xhr.response;
        window.location.href = "/admin/blog/" + id;
      });
      form.addEventListener("htmx:beforeRequest", function (event) {
        let button = document.getElementById("submit_button");
        button.innerHTML = "Generating…";
        button.setAttribute("disabled", "disabled");
      });
    </script>
  </div>
</section>
{{ end }}
