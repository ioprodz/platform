{{ define "content" }}
<section>
  <div class="space-y-6">
    <div class="flex items-center justify-between">
      <h2 class="text-xl font-semibold text-text tracking-tight">All Blog Posts</h2>
      <a href="/admin/blog/create"
        class="inline-flex items-center gap-1.5 rounded-md bg-accent px-3.5 py-1.5 text-[13px] font-medium text-black hover:bg-accent/90 transition-colors">
        Create new
      </a>
    </div>

    <ul class="space-y-3">
      {{ range . }}
      <li>
        <a href="/admin/blog/{{ .Id }}"
          class="block rounded-xl border border-border bg-surface/40 p-5 hover:border-border-strong hover:bg-surface transition-colors">
          <div class="flex items-center gap-3 mb-2">
            <div class="font-semibold text-text text-[15px] tracking-tight flex-1 truncate">{{ .Title }}</div>
            <span class="inline-flex items-center gap-1.5 font-mono text-[10px] uppercase tracking-[0.18em] {{ if .IsReviewed }}text-accent{{ else }}text-text-dim{{ end }}">
              <span class="h-1.5 w-1.5 rounded-full {{ if .IsReviewed }}bg-accent{{ else }}bg-text-dim{{ end }}"></span>
              {{ if .IsReviewed }}Reviewed{{ else }}Not reviewed{{ end }}
            </span>
            <span class="inline-flex items-center gap-1.5 font-mono text-[10px] uppercase tracking-[0.18em] {{ if .IsPublished }}text-accent{{ else }}text-text-dim{{ end }}">
              <span class="h-1.5 w-1.5 rounded-full {{ if .IsPublished }}bg-accent{{ else }}bg-text-dim{{ end }}"></span>
              {{ if .IsPublished }}Published{{ else }}Draft{{ end }}
            </span>
          </div>
          <p class="line-clamp-2 text-[13px] text-text-muted leading-relaxed">{{ .Body }}</p>
        </a>
      </li>
      {{ end }}
    </ul>
  </div>
</section>
{{ end }}
